<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Red Flag Detector v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d0d;--card:#161616;--card2:#1e1e1e;--border:#2a2a2a;
  --red:#ff3b3b;--red-dim:rgba(255,59,59,0.12);--amber:#ffb627;--green:#00d68f;
  --text:#f0ece4;--muted:#888;--bubble-them:#252525;--bubble-me:#c0392b;
  --font-display:'Playfair Display',serif;--font-mono:'DM Mono',monospace;--font-body:'Nunito',sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-body);}
body{display:flex;flex-direction:column;align-items:center;padding:0 16px 80px;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.6;}
body>*{position:relative;z-index:1;}

header{width:100%;max-width:440px;padding:28px 0 20px;text-align:center;}
.header-tag{display:inline-block;font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--red);border:1px solid var(--red);border-radius:3px;padding:3px 10px;margin-bottom:12px;}
h1{font-family:var(--font-display);font-size:42px;font-weight:900;line-height:1;letter-spacing:-1px;color:var(--text);margin-bottom:4px;}
h1 span{color:var(--red);font-style:italic;}
.subtitle{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.06em;}

.mode-toggle{width:100%;max-width:440px;display:flex;gap:8px;margin-bottom:16px;}
.mode-btn{flex:1;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--font-body);font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;}
.mode-btn.active{background:var(--red-dim);border-color:var(--red);color:var(--text);}

.picker{width:100%;max-width:440px;margin-bottom:16px;}
.picker-label{font-size:10px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.scenario-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.scenario-btn{padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--font-body);font-size:11px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;line-height:1.3;}
.scenario-btn:hover{border-color:var(--red);color:var(--text);}
.scenario-btn.active{border-color:var(--red);background:var(--red-dim);color:var(--text);}
.scenario-btn .emoji{display:block;font-size:16px;margin-bottom:3px;}

.tiktok-card{width:100%;max-width:440px;background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 0 60px rgba(255,59,59,0.07);position:relative;}

/* TIKTOK MODE */
body.tiktok-mode{padding:0;background:#000;}
body.tiktok-mode header,body.tiktok-mode .picker,body.tiktok-mode .mode-toggle,body.tiktok-mode .controls,body.tiktok-mode .counter{display:none;}
body.tiktok-mode .tiktok-card{max-width:100%;width:100vw;border-radius:0;border:none;min-height:100vh;display:flex;flex-direction:column;}
body.tiktok-mode .chat-area{flex:1;}
.tiktok-overlay{display:none;position:fixed;z-index:50;bottom:90px;left:0;right:0;padding:0 16px;flex-direction:column;gap:6px;}
body.tiktok-mode .tiktok-overlay{display:flex;}
.tiktok-nav{display:flex;gap:8px;}
.tiktok-nav button{flex:1;padding:13px;border:none;border-radius:10px;font-family:var(--font-display);font-size:17px;font-weight:700;cursor:pointer;letter-spacing:.5px;}
.tiktok-reveal-btn{background:var(--red);color:#fff;}
.tiktok-next-btn{background:#222;color:var(--muted);}
.tiktok-exit{text-align:center;font-size:11px;font-weight:800;color:rgba(255,255,255,0.3);letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:4px;}
.tiktok-exit:hover{color:rgba(255,255,255,0.6);}
.tiktok-brand{display:none;position:absolute;top:0;left:0;right:0;padding:20px 18px 14px;background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);pointer-events:none;z-index:5;}
body.tiktok-mode .tiktok-brand{display:flex;align-items:center;gap:10px;}
.tiktok-brand-logo{font-family:var(--font-display);font-size:22px;font-weight:900;color:#fff;}
.tiktok-brand-logo span{color:var(--red);font-style:italic;}
.tiktok-brand-tag{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:.1em;margin-left:auto;}

.phone-header{background:var(--card2);padding:13px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#ff3b3b);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;}
.contact-name{font-size:14px;font-weight:800;color:var(--text);}
.contact-status{font-size:10px;color:var(--green);font-weight:700;}
.header-dots{display:flex;gap:4px;margin-left:auto;}
.header-dots span{width:4px;height:4px;border-radius:50%;background:var(--muted);}

.chat-area{padding:0;display:flex;flex-direction:column;gap:0;}
.msg{display:flex;flex-direction:column;max-width:92%;height:100vh;justify-content:center;padding:20px;animation:msgIn .3s ease forwards;opacity:0;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.them{align-self:flex-start;}
.msg.me{align-self:flex-end;}
.bubble{padding:28px 26px;border-radius:16px;font-size:28px;line-height:1.65;font-weight:600;}
.msg.them .bubble{background:var(--bubble-them);color:var(--text);border-bottom-left-radius:4px;}
.msg.me .bubble{background:var(--bubble-me);color:#fff;border-bottom-right-radius:4px;}
.msg-time{font-size:16px;color:var(--muted);margin-top:8px;font-weight:600;}
.msg.me .msg-time{text-align:right;}
.msg.flagged .bubble{outline:2px solid var(--red);outline-offset:2px;}
.msg.flagged.them .bubble{background:#2a1515;}
.flag-badge{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:#fff;font-family:var(--font-mono);font-size:18px;padding:8px 18px;border-radius:99px;margin-top:12px;animation:badgeIn .4s ease .1s forwards;opacity:0;clear:both;}
@keyframes badgeIn{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}
.chat-divider{text-align:center;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);position:relative;margin:4px 0;}
.chat-divider::before,.chat-divider::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--border);}
.chat-divider::before{left:0;}.chat-divider::after{right:0;}

.reveal-panel{background:var(--card2);border-top:1px solid var(--border);padding:16px;display:none;}
.reveal-panel.show{display:block;}
.reveal-title{font-family:var(--font-display);font-size:32px;font-weight:900;color:var(--red);margin-bottom:16px;}
.score-bar{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:28px 24px;margin-bottom:20px;}
.score-emojis{font-size:32px;letter-spacing:6px;}
.score-text{font-size:22px;font-weight:800;}
.score-sub{font-size:16px;color:var(--muted);font-weight:600;}
.flag-item{display:flex;gap:16px;align-items:center;padding:24px 0;height:100vh;border-bottom:1px solid var(--border);}
.flag-item:last-child{border-bottom:none;}
.flag-num{width:44px;height:44px;border-radius:8px;background:var(--red-dim);border:1px solid var(--red);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:18px;color:var(--red);flex-shrink:0;}
.flag-name{font-size:12px;font-weight:800;color:var(--text);margin-bottom:2px;}
.flag-desc{font-size:11px;color:var(--muted);line-height:1.5;font-weight:600;}

.controls{width:100%;max-width:440px;margin-top:14px;display:flex;gap:8px;}
.btn-reveal{flex:1;padding:13px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:var(--font-display);font-size:17px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;letter-spacing:.5px;}
.btn-reveal:hover{opacity:.9;transform:translateY(-1px);}
.btn-next{padding:13px 16px;background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:10px;font-family:var(--font-body);font-size:13px;font-weight:800;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-next:hover{border-color:var(--text);color:var(--text);}
.counter{width:100%;max-width:440px;text-align:center;margin-top:8px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}

/* TIKTOK SWIPE MODE */
#tikSwipe{display:none;position:fixed;inset:0;z-index:500;background:#0a0a0a;overflow:hidden;font-family:var(--font-body);}
body.tiktok-mode #tikSwipe{display:block;}
body.tiktok-mode>*:not(#tikSwipe){display:none !important;}
.tik-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;cursor:pointer;}
.tik-screen.hidden{opacity:0;pointer-events:none;transform:translateY(80px);}
.tik-screen.exit{transform:translateY(-110%);opacity:0;transition:transform .28s ease,opacity .2s;}

/* front page */
.tik-front{text-align:center;width:100%;max-width:400px;}
.tik-front-logo{font-size:64px;margin-bottom:20px;display:block;}
.tik-front-title{font-family:var(--font-display);font-size:42px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:16px;}
.tik-front-title span{color:var(--red);font-style:italic;}
.tik-front-sub{font-size:17px;color:rgba(255,255,255,.55);line-height:1.6;margin-bottom:40px;}
.tik-front-btn{background:var(--red);color:#fff;border:none;border-radius:99px;padding:18px 48px;font-family:var(--font-display);font-size:20px;font-weight:900;cursor:pointer;letter-spacing:.5px;transition:transform .15s,background .15s;display:inline-block;}
.tik-front-btn:hover{background:#e02020;transform:scale(1.03);}
.tik-front-tap{margin-top:24px;font-size:12px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.2);}

/* message card */
.tik-msg-wrap{width:100%;max-width:420px;}
.tik-msg-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.tik-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#c0392b);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0;}
.tik-name{font-size:15px;font-weight:800;color:var(--text);}
.tik-status{font-size:11px;color:var(--muted);}
.tik-bubble-wrap{background:var(--card);border-radius:20px;padding:28px 26px;border:1px solid var(--border);margin-bottom:12px;}
.tik-bubble-text{font-family:var(--font-display);font-size:28px;font-weight:700;color:#fff;line-height:1.5;}
.tik-bubble-time{font-size:13px;color:var(--muted);margin-top:14px;font-family:var(--font-mono);}
.tik-tap-hint{text-align:center;font-size:12px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.2);animation:tikpulse 2s ease-in-out infinite;margin-top:8px;}
@keyframes tikpulse{0%,100%{opacity:.2;}50%{opacity:.5;}}

/* debate card */
.tik-debate-wrap{width:100%;max-width:440px;text-align:center;}
.tik-debate-emoji{font-size:52px;margin-bottom:16px;display:block;}
.tik-debate-title{font-family:var(--font-display);font-size:32px;font-weight:900;color:#fff;margin-bottom:10px;}
.tik-debate-quote{font-size:17px;color:rgba(255,255,255,.6);line-height:1.6;font-style:italic;margin-bottom:24px;padding:18px;background:rgba(255,255,255,.05);border-radius:16px;border:1px solid rgba(255,255,255,.08);}
.tik-debate-vs{display:flex;gap:12px;align-items:center;margin-bottom:24px;}
.tik-opt{flex:1;padding:20px 10px;border-radius:16px;font-size:16px;font-weight:900;text-align:center;line-height:1.4;}
.tik-opt-r{background:rgba(255,59,59,.15);border:2px solid rgba(255,59,59,.5);color:#ff6b6b;}
.tik-opt-g{background:rgba(0,214,143,.1);border:2px solid rgba(0,214,143,.4);color:#00d68f;}
.tik-vs-divider{font-family:var(--font-display);font-size:20px;font-weight:900;color:rgba(255,255,255,.3);flex-shrink:0;}
.tik-debate-arrow{font-size:28px;margin-bottom:10px;animation:tikpulse 1.2s ease-in-out infinite;}
.tik-debate-cta{font-family:var(--font-display);font-size:20px;font-weight:900;color:#fff;margin-bottom:8px;}
.tik-debate-subcta{font-size:12px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.25);animation:tikpulse 2s ease-in-out infinite;}

/* reveal card */
.tik-reveal-wrap{width:100%;max-width:420px;border-radius:28px;padding:44px 36px;text-align:center;}
.tik-reveal-wrap.rf{background:linear-gradient(160deg,#1a0505,#2a0808);border:2px solid var(--red);}
.tik-reveal-wrap.ok{background:linear-gradient(160deg,#051a0d,#082816);border:2px solid var(--green);}
.tik-reveal-big{font-size:64px;margin-bottom:16px;display:block;}
.tik-reveal-verdict{font-family:var(--font-display);font-size:36px;font-weight:900;margin-bottom:10px;}
.tik-reveal-wrap.rf .tik-reveal-verdict{color:var(--red);}
.tik-reveal-wrap.ok .tik-reveal-verdict{color:var(--green);}
.tik-reveal-flagname{font-size:20px;font-weight:800;color:#fff;margin-bottom:14px;}
.tik-reveal-desc{font-size:16px;color:rgba(255,255,255,.65);line-height:1.7;font-weight:600;}
.tik-reveal-ok-desc{font-size:18px;color:rgba(255,255,255,.6);line-height:1.65;}
.tik-next-cta{margin-top:20px;font-size:12px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.2);animation:tikpulse 2s ease-in-out infinite;}

/* progress bar */
.tik-prog-bar{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.08);}
.tik-prog-fill{height:100%;background:var(--red);transition:width .3s ease;border-radius:0 2px 2px 0;}

/* exit */
.tik-exit-btn{position:absolute;top:18px;right:18px;z-index:10;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.45);font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border-radius:99px;cursor:pointer;font-family:var(--font-body);transition:all .15s;}
.tik-exit-btn:hover{color:#fff;background:rgba(255,255,255,.12);}
.tik-counter{position:absolute;top:22px;left:18px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);}

.tik-interrupt-wrap,.tik-decision-wrap,.tik-verdict-wrap{width:100%;max-width:440px;text-align:center;}
.tik-interrupt-bar,.tik-decision-bar{display:inline-block;color:#fff;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:6px 16px;border-radius:4px;margin-bottom:20px;}
.tik-interrupt-bar{background:var(--red);}
.tik-decision-bar{background:#e07000;}
.tik-interrupt-q{font-family:var(--font-display);font-size:34px;font-weight:900;color:#fff;line-height:1.25;margin-bottom:12px;}
.tik-interrupt-sub{font-size:15px;color:rgba(255,255,255,.4);font-weight:600;}
.tik-decision-q{font-family:var(--font-display);font-size:30px;font-weight:900;color:#fff;line-height:1.25;margin-bottom:24px;}
.tik-decision-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.tik-decision-opt{padding:16px 20px;border-radius:14px;font-size:16px;font-weight:800;text-align:left;border:1.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);background:rgba(255,255,255,.05);}
.tik-decision-cta{font-family:var(--font-display);font-size:18px;font-weight:900;color:#e07000;margin-bottom:6px;}
.tik-decision-sub{font-size:12px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.2);animation:tikpulse 2s ease-in-out infinite;}
.tik-verdict-title{font-family:var(--font-display);font-size:32px;font-weight:900;line-height:1.2;margin-bottom:18px;color:#fff;}
.tik-verdict-body{font-size:16px;color:rgba(255,255,255,.7);line-height:1.7;margin-bottom:20px;padding:18px;background:rgba(255,255,255,.05);border-radius:14px;border:1px solid rgba(255,255,255,.08);}
.tik-verdict-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;}
.tik-verdict-tag{font-size:13px;font-weight:800;padding:6px 14px;border-radius:99px;}
.tik-verdict-tag.r{background:rgba(255,59,59,.15);border:1.5px solid rgba(255,59,59,.4);color:#ff6b6b;}
.tik-verdict-tag.g{background:rgba(0,214,143,.1);border:1.5px solid rgba(0,214,143,.3);color:#00d68f;}
.tik-verdict-tag.a{background:rgba(255,107,0,.1);border:1.5px solid rgba(255,107,0,.3);color:#ff9a4d;}
.tik-verdict-cta{font-family:var(--font-display);font-size:16px;font-weight:900;color:rgba(255,255,255,.45);}

/* INTERRUPT PATTERN BREAK */
@keyframes tikShake{
  0%{transform:translateX(0);}
  15%{transform:translateX(-8px);}
  30%{transform:translateX(8px);}
  45%{transform:translateX(-6px);}
  60%{transform:translateX(6px);}
  75%{transform:translateX(-3px);}
  90%{transform:translateX(3px);}
  100%{transform:translateX(0);}
}
@keyframes tikFlash{
  0%{opacity:0;}
  20%{opacity:0.35;}
  40%{opacity:0;}
  60%{opacity:0.2;}
  100%{opacity:0;}
}
.tik-flash-overlay{
  position:absolute;inset:0;background:var(--red);
  pointer-events:none;z-index:20;opacity:0;
}
.tik-screen.interrupt-active{
  animation:tikShake .5s ease forwards;
}
.tik-interrupt-wrap{
  position:relative;
}
.tik-interrupt-bar{
  animation:tikpulse .8s ease-in-out infinite;
}
</style>
</head>
<body>

<header>
  <div class="header-tag">🚩 Psychology Series</div>
  <h1>Red <span>Flag</span><br>Detector</h1>
  <p class="subtitle">Spot the toxic behaviour — then learn the psychology</p>
</header>

<div class="mode-toggle">
  <button class="mode-btn active" onclick="setMode('normal')">📱 Normal view</button>
  <button class="mode-btn" onclick="setMode('tiktok')">🎬 TikTok mode</button>
</div>

<div class="picker">
  <div class="picker-label">Choose a scenario</div>
  <div class="scenario-grid" id="scenarioGrid"></div>
</div>

<div class="tiktok-card" id="card">
  <div class="tiktok-brand">
    <div class="tiktok-brand-logo">Red <span>Flag</span> Detector</div>
    <div class="tiktok-brand-tag">🚩 psychology</div>
  </div>
  <div class="phone-header">
    <div class="avatar" id="avatarInitial">A</div>
    <div class="contact-info">
      <div class="contact-name" id="contactName">Alex</div>
      <div class="contact-status">Active now</div>
    </div>
    <div class="header-dots"><span></span><span></span><span></span></div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="reveal-panel" id="revealPanel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;"><div class="reveal-title" style="margin-bottom:0;">🚩 Red Flags Detected</div><button onclick="hideReveal()" style="background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:4px 10px;cursor:pointer;">X Close</button></div>
    <div id="scoreBar" class="score-bar"></div>
    <div id="flagList"></div>
  </div>
</div>

<div class="tiktok-overlay">
  <div class="tiktok-nav">
    <button class="tiktok-reveal-btn" id="tikRevealBtn" onclick="toggleReveal()">Reveal 🚩</button>
    <button class="tiktok-next-btn" onclick="nextScenario()">Next ↻</button>
  </div>
  <div class="tiktok-exit" onclick="setMode('normal')">✕ exit tiktok mode</div>
</div>

<div class="controls">
  <button class="btn-reveal" id="revealBtn" onclick="toggleReveal()">Reveal the red flags →</button>
  <button class="btn-next" onclick="nextScenario()">Next ↻</button>
</div>
<div class="counter" id="counter"></div>

<script>
const SCENARIOS = [
  {

function tikUpdateProgress(){
  var total=tikItems.length;
  var msgCount=0,doneCount=0;
  // count reveal screens done
  var fills=Math.floor(tikIdx/3); // front+msg+debate+reveal = 4 per item, idx 0=front
  var pct=tikIdx===0?0:Math.min(100,Math.round(((tikIdx-1)/3)/total*100));
  var fill=document.getElementById('tikProgFill');
  if(fill) fill.style.width=pct+'%';
  var ctr=document.getElementById('tikCounter');
  if(ctr){
    var itemNum=tikIdx===0?0:Math.min(total,Math.ceil((tikIdx)/3));
    if(tikIdx===0) ctr.textContent='';
    else ctr.textContent=itemNum+' / '+total;
  }
}

function tikAdvance(e){
  if(e){e.stopPropagation();}
  if(tikTapping) return;
  tikTapping=true;
  setTimeout(function(){tikTapping=false;},350);

  var deck=document.getElementById('tikDeck');
  var cur=deck.querySelector('.tik-screen:not(.hidden):not(.exit)');
  if(cur) cur.classList.add('exit');
  setTimeout(function(){if(cur&&cur.parentNode)cur.parentNode.removeChild(cur);},320);

  tikIdx++;

  // build next screen
  var next=null;
  if(tikIdx===0){
    next=makeFrontScreen();
  } else {
    var phase=(tikIdx-1)%3; // 0=msg,1=debate,2=reveal
    var itemIdx=Math.floor((tikIdx-1)/3);
    if(itemIdx>=tikItems.length){
      // end screen
      next=document.createElement('div');
      next.className='tik-screen hidden';
      next.innerHTML = getEndScreenHtml();
    } else {
      var item=tikItems[itemIdx];
      if(phase===0) next=makeMsgScreen(item);
      else if(phase===1) next=makeDebateScreen(item);
      else next=makeRevealScreen(item);
    }
  }

  if(next){
    next.classList.add('hidden');
    deck.appendChild(next);
    setTimeout(function(){ next.classList.remove('hidden'); }, 20);
    next.addEventListener('click', function(e){tikAdvance(e);});
  }
  tikUpdateProgress();
}

function buildSituScreen(item){
  var div=document.createElement('div');
  div.className='tik-screen';
  var h='';

  if(item.t==='raw'){
    h='<div style="max-width:380px;text-align:center;display:flex;flex-direction:column;gap:20px;">';
    for(var i=0;i<item.lines.length;i++){
      h+='<div style="font-family:var(--font-display);font-size:32px;font-weight:900;color:'+(i===0?'rgba(255,255,255,.4)':'#fff')+';line-height:1.3;">'+item.lines[i]+'</div>';
    }
    h+='</div><div class="tik-tap-hint">tap to continue</div>';

  } else if(item.t==='you'){
    h='<div style="width:100%;max-width:420px;text-align:right;">';
    h+='<div style="display:inline-block;background:#c0392b;border-radius:20px 20px 4px 20px;padding:24px 26px;max-width:88%;">';
    h+='<div style="font-family:var(--font-display);font-size:26px;font-weight:700;color:#fff;line-height:1.5;font-style:italic;">'+item.txt+'</div>';
    h+='</div>';
    h+='<div style="font-size:12px;color:rgba(255,255,255,.2);margin-top:8px;font-family:var(--font-mono);">You</div>';
    h+='</div><div class="tik-tap-hint">tap to continue</div>';

  } else if(item.t==='msg'){
    h='<div style="width:100%;max-width:420px;">';
    h+='<div style="font-size:12px;color:rgba(255,255,255,.2);margin-bottom:10px;font-family:var(--font-mono);">'+item.name+'</div>';
    h+='<div style="background:#111;border-radius:20px 20px 20px 4px;padding:28px 26px;border:1px solid #222;">';
    h+='<div style="font-family:var(--font-display);font-size:30px;font-weight:900;color:#fff;line-height:1.4;">'+item.txt+'</div>';
    h+='</div></div><div class="tik-tap-hint">tap to continue</div>';

  } else if(item.t==='interrupt'){
    var barText=item.style==='doubt'?'&#x1F6A9; WAIT':'&#x1F504; REFRAME';
    h='<div class="tik-flash-overlay" id="tikFlashOverlay"></div>';
    h+='<div class="tik-interrupt-wrap">';
    h+='<div class="tik-interrupt-bar">'+barText+'</div>';
    h+='<div class="tik-interrupt-q">'+item.q+'</div>';
    h+='<div class="tik-interrupt-sub">'+item.sub+'</div>';
    h+='</div><div class="tik-tap-hint">tap to continue</div>';

  } else if(item.t==='decision'){
    h='<div class="tik-decision-wrap">';
    h+='<div class="tik-decision-bar">WHAT DO YOU DO?</div>';
    h+='<div class="tik-decision-q">'+item.q+'</div>';
    h+='<div class="tik-decision-opts" id="situDecisionOpts" onclick="handleDecisionClick(event)">';
    for(var i=0;i<item.opts.length;i++){
      var letter=String.fromCharCode(65+i);
      h+='<div class="tik-decision-opt" data-choice="'+letter+'" data-tag="'+item.tags[i]+'">'+item.opts[i]+'</div>';
    }
    h+='</div>';
    h+='<div class="tik-decision-cta">'+item.cta+'</div>';
    h+='<div class="tik-decision-sub" id="situDecisionHint">tap your answer</div>';
    h+='</div>';

  } else if(item.t==='verdict_a' || item.t==='verdict_b'){
    var showing = (userChoice==='B') ? 'verdict_b' : 'verdict_a';
    if(item.t !== showing){ div.className='tik-screen hidden-skip'; div.innerHTML=''; return div; }
    var icon = item.t==='verdict_b' ? '&#x2705;' : '&#x26A0;&#xFE0F;';
    h='<div class="tik-verdict-wrap">';
    h+='<div style="font-size:48px;margin-bottom:16px;">'+icon+'</div>';
    h+='<div style="font-family:var(--font-display);font-size:34px;font-weight:900;color:'+(item.t==='verdict_b'?'var(--green)':'var(--red)')+';margin-bottom:16px;">'+item.hook+'</div>';
    h+='<div class="tik-verdict-body">'+item.truth+'</div>';
    h+='<div class="tik-verdict-tags">';
    for(var i=0;i<item.tags.length;i++){h+='<div class="tik-verdict-tag '+item.tags[i].c+'">'+item.tags[i].txt+'</div>';}
    h+='</div></div><div class="tik-tap-hint">tap to continue</div>';

  } else if(item.t==='stay'){
    h='<div style="width:100%;max-width:420px;text-align:center;">';
    h+='<div style="font-family:var(--font-display);font-size:34px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:36px;">'+item.q+'</div>';
    h+='<div style="display:flex;flex-direction:column;gap:14px;margin-bottom:28px;">';
    h+='<div style="padding:20px 24px;border-radius:14px;background:rgba(255,59,59,.12);border:2px solid rgba(255,59,59,.4);font-family:var(--font-display);font-size:22px;font-weight:900;color:#ff6b6b;">'+item.a+'</div>';
    h+='<div style="padding:20px 24px;border-radius:14px;background:rgba(0,214,143,.08);border:2px solid rgba(0,214,143,.3);font-family:var(--font-display);font-size:22px;font-weight:900;color:#00d68f;">'+item.b+'</div>';
    h+='</div>';
    h+='<div style="font-size:16px;font-weight:700;color:rgba(255,255,255,.3);">'+item.sting+'</div>';
    h+='</div>';
  }

  div.innerHTML=h;
  return div;
}

function handleDecisionClick(e){
  var opt=e.target.closest('[data-choice]');
  if(!opt) return;
  pickSituChoice(e, opt.dataset.choice);
}

function pickSituChoice(e, choice){
  e.stopPropagation();
  userChoice = choice;
  // highlight selected
  var opts = document.querySelectorAll('#situDecisionOpts .tik-decision-opt');
  opts.forEach(function(o,i){
    var letter = String.fromCharCode(65+i);
    o.style.borderColor = letter===choice ? '#e07000' : 'rgba(255,255,255,.12)';
    o.style.background = letter===choice ? 'rgba(224,112,0,.15)' : 'rgba(255,255,255,.05)';
    o.style.color = letter===choice ? '#ff9a4d' : 'rgba(255,255,255,.75)';
  });
  var hint = document.getElementById('situDecisionHint');
  if(hint){ hint.textContent = 'tap anywhere to reveal'; hint.style.color='rgba(255,255,255,.5)'; }
}

function advanceSitu(){
  if(tikTapping)return;
  tikTapping=true;
  setTimeout(function(){tikTapping=false;},350);
  var deck=document.getElementById('tikDeck');
  var cur=deck.querySelector('.tik-screen:not(.hidden):not(.exit)');
  if(cur){cur.classList.add('exit');setTimeout(function(){if(cur&&cur.parentNode)cur.parentNode.removeChild(cur);},320);}
  situIdx++;
  if(situIdx>=currentSeq.length){
    tikIdx=-1;
    tikAdvance(null);
    return;
  }
  var next=buildSituScreen(currentSeq[situIdx]);
  if(next.className==='tik-screen hidden-skip'){advanceSitu();return;}
  next.classList.add('hidden');
  deck.appendChild(next);
  setTimeout(function(){
    next.classList.remove('hidden');
    if(currentSeq[situIdx].t==='interrupt'){
      next.classList.add('interrupt-active');
      var flash=next.querySelector('#tikFlashOverlay');
      if(flash){
        flash.style.animation='tikFlash .6s ease forwards';
        setTimeout(function(){flash.style.animation='';},700);
      }
    }
  },20);
  next.addEventListener('click',function(e){e.stopPropagation();advanceSitu();});
  var fill=document.getElementById('tikProgFill');
  if(fill)fill.style.width=Math.round(((situIdx+1)/currentSeq.length)*100)+'%';
  var ctr=document.getElementById('tikCounter');
  if(ctr)ctr.textContent=(situIdx+1)+' / '+currentSeq.length;
}

function initTikMode(){
  tikItems=getAllTikMessages();
  tikIdx=-1;

}

function hideReveal(){
  document.getElementById('revealPanel').classList.remove('show');
  var rb=document.getElementById('revealBtn');if(rb)rb.style.display='';
  var ov=document.querySelector('.tiktok-overlay');if(ov){ov.style.opacity='1';ov.style.pointerEvents='';}
}

function setMode(mode){
  isTikTok=(mode==='tiktok');
  document.body.classList.toggle('tiktok-mode',isTikTok);
  document.querySelectorAll('.mode-btn').forEach(function(b,i){b.classList.toggle('active',(i===0&&!isTikTok)||(i===1&&isTikTok));});
  if(isTikTok){window.scrollTo(0,0);initTikMode();}
}


function buildScenarioPicker(){
  const grid=document.getElementById('scenarioGrid');
  SCENARIOS.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='scenario-btn'+(i===0?' active':'');
    btn.innerHTML=`<span class="emoji">${s.emoji}</span>${s.name}`;
    btn.onclick=()=>loadScenario(i);
    grid.appendChild(btn);
  });
}

function loadScenario(idx){
  currentIdx=idx;revealed=false;
  const s=SCENARIOS[idx];
  document.querySelectorAll('.scenario-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.getElementById('contactName').textContent=s.contact;
  document.getElementById('avatarInitial').textContent=s.contact[0];
  const chat=document.getElementById('chatArea');
  chat.innerHTML='';
  s.messages.forEach((msg,i)=>{
    if(msg.isGap){
      const d=document.createElement('div');d.className='chat-divider';d.textContent=msg.gapText;chat.appendChild(d);return;
    }
    const d=document.createElement('div');
    d.className='msg '+msg.side;
    d.style.animationDelay=(i*0.07)+'s';
    d.innerHTML=`<div class="bubble">${msg.text}</div>${msg.time?`<div class="msg-time">${msg.time}</div>`:''}`;
    chat.appendChild(d);
  });
  document.getElementById('revealPanel').classList.remove('show');
  ['revealBtn','tikRevealBtn'].forEach(id=>{
    const b=document.getElementById(id);
    if(b){b.textContent=id==='tikRevealBtn'?'Reveal 🚩':'Reveal the red flags →';b.style.background='';b.style.cursor='';}
  });
  document.getElementById('counter').textContent=`Scenario ${idx+1} of ${SCENARIOS.length}`;
}

function toggleReveal(){
  if(revealed)return;
  revealed=true;
  const s=SCENARIOS[currentIdx];
  const msgs=document.querySelectorAll('.msg');
  let mIdx=0;
  s.messages.forEach(msgData=>{
    if(msgData.isGap)return;
    const el=msgs[mIdx];
    if(el&&msgData.flag){
      el.classList.add('flagged');
      const badge=document.createElement('div');
      badge.className='flag-badge';
      badge.innerHTML=`🚩 ${msgData.flag.name}`;
      const bubble=el.querySelector('.bubble');if(bubble)bubble.insertAdjacentElement('afterend',badge);else el.appendChild(badge);
    }
    mIdx++;
  });
  const count=s.flags.length;
  const emojis='🚩'.repeat(count);
  const level=count>=3?{text:'High risk — run 🏃',color:'#ff3b3b'}:{text:'Concerning pattern',color:'#ffb627'};
  document.getElementById('scoreBar').innerHTML=`
    <div><div style="font-size:18px;letter-spacing:2px;">${emojis}</div></div>
    <div><div class="score-text" style="color:${level.color}">${count} Red Flag${count>1?'s':''} Found</div><div class="score-sub">${level.text}</div></div>`;
  const list=document.getElementById('flagList');
  list.innerHTML='';
  s.flags.forEach((f,i)=>{
    const item=document.createElement('div');
    item.className='flag-item';
    item.innerHTML=`<div class="flag-num">${i+1}</div><div><div class="flag-name">🚩 ${f.name}</div><div class="flag-desc">${f.desc}</div></div>`;
    list.appendChild(item);
  });
  document.getElementById('revealPanel').classList.add('show');
  ['revealBtn','tikRevealBtn'].forEach(id=>{
    const b=document.getElementById(id);
    if(b){b.textContent='✓ Revealed';b.style.background='#333';b.style.cursor='default';}
  });
  setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),200);
}

function nextScenario(){
  loadScenario((currentIdx+1)%SCENARIOS.length);
  if(isTikTok)window.scrollTo(0,0);
}
